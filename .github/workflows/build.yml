$zip = Get-ChildItem -Path "$env:USERPROFILE\Downloads" -Filter "flutter*.zip" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
if (-not $zip) {
    $zip = Get-ChildItem -Path "$env:TEMP" -Filter "*flutter*.zip" -Recurse | Select-Object -First 1
}

if ($zip) {
    Write-Output "Expand-Archive extracting $($zip.FullName) to C:\src..."
    Expand-Archive -Path $zip.FullName -DestinationPath "C:\src" -Force
    Write-Output "Extraction complete. Path updated!"
}
