name: Build Aura Music APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flet-dev/flet-build:main
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Build Android APK
        run: |
          mkdir -p assets
          python -m flet build apk

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: aura-music-android-app
          path: build/apk/*.apk
