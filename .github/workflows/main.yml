name: Build Android APK

on:
  push:
    branches:
      - Aura  # Oya wada karana branch eke nama methana thiyenna ona

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug  # Release build ekakata 'release' danna, habai signing keys ona wei. Debug eka lesiyi.

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: aura-music-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
